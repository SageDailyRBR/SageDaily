<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Sage">
    <title>Daily Sage</title>
    <link href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Sniglet', cursive;
            position: relative;
            background: #87CEEB;
        }
        
        /* Cielo con nuvole */
        .sky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #4A90E2 0%, #87CEEB 50%, #E0F6FF 100%);
            overflow: hidden;
            z-index: 1;
        }
        
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 100px;
            opacity: 0.9;
            animation: floatUp linear infinite;
        }
        
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 100px;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0); }
            100% { transform: translateY(-200px) translateX(20px); }
        }
        
        .cloud1 { width: 100px; height: 40px; left: 10%; animation-duration: 25s; animation-delay: 0s; }
        .cloud1::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        .cloud1::after { width: 60px; height: 40px; top: -15px; right: 10px; }
        
        .cloud2 { width: 80px; height: 35px; left: 30%; animation-duration: 30s; animation-delay: 5s; }
        .cloud2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud2::after { width: 50px; height: 35px; top: -10px; right: 15px; }
        
        .cloud3 { width: 120px; height: 45px; left: 60%; animation-duration: 35s; animation-delay: 2s; }
        .cloud3::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud3::after { width: 70px; height: 45px; top: -20px; right: 20px; }
        
        .cloud4 { width: 90px; height: 38px; left: 80%; animation-duration: 28s; animation-delay: 8s; }
        .cloud4::before { width: 45px; height: 45px; top: -22px; left: 12px; }
        .cloud4::after { width: 55px; height: 38px; top: -12px; right: 12px; }
        
        .cloud5 { width: 110px; height: 42px; left: 45%; animation-duration: 32s; animation-delay: 12s; }
        .cloud5::before { width: 55px; height: 55px; top: -28px; left: 18px; }
        .cloud5::after { width: 65px; height: 42px; top: -18px; right: 18px; }
        
        /* Bottone impostazioni */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            font-size: 24px;
        }
        
        .settings-btn:hover {
            transform: rotate(90deg);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .settings-btn:active {
            transform: scale(0.95);
        }
        
        /* Modal impostazioni */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .settings-modal.active {
            display: flex;
            opacity: 1;
        }
        
        .settings-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .settings-modal.active .settings-content {
            transform: scale(1);
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .settings-title {
            font-family: 'Sniglet', cursive;
            font-size: 3.5rem;
            color: #2C3E50;
            font-weight: 800;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #7F8C8D;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .close-btn:hover {
            background: #F0F0F0;
        }
        
        .language-option {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .language-option:hover {
            background: #F8F9FA;
        }
        
        .language-option.selected {
            background: #E3F2FD;
            border-color: #4A90E2;
        }
        
        .language-flag {
            font-size: 2rem;
            margin-right: 15px;
        }
        
        .language-info {
            flex: 1;
        }
        
        .language-name {
            font-family: 'Sniglet', cursive;
            font-size: 1.1rem;
            color: #2C3E50;
            font-weight: 700;
        }
        
        .language-native {
            font-size: 0.9rem;
            color: #7F8C8D;
        }
        
        .check-mark {
            font-size: 1.5rem;
            color: #4A90E2;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .language-option.selected .check-mark {
            opacity: 1;
        }
        
        /* Container principale */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .sage-image {
            width: 260px;
            height: 260px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
            animation: gentleFloat 4s ease-in-out infinite;
            margin-bottom: 30px;
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        .text-container {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            max-width: 90vw;
        }
        
        .date-text {
            font-family: 'Sniglet', cursive;
            font-size: 2.8rem;
            font-weight: 800;
            color: #2C3E50;
            text-shadow: 3px 3px 0px rgba(255,255,255,0.8), 5px 5px 10px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            opacity: 0;
            transform: scale(0.8) rotate(-2deg);
            animation: popIn 0.8s ease-out forwards;
            line-height: 1.3;
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            70% { transform: scale(1.05) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(-2deg); }
        }
        
        .fade-out {
            animation: fadeOutRotate 0.8s ease-in forwards;
        }
        
        @keyframes fadeOutRotate {
            0% { opacity: 1; transform: scale(1) rotate(-2deg); }
            100% { opacity: 0; transform: scale(1.1) rotate(3deg) translateY(-30px); filter: blur(5px); }
        }
        
        .quote-text {
            font-family: 'Gochi Hand', cursive;
            font-size: 3.8rem;
            font-weight: 400;
            color: #1A252F;
            line-height: 1.5;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.9), 4px 4px 8px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(40px) rotate(3deg);
            max-width: 600px;
            padding: 0 20px;
        }
        
        .quote-text.visible {
            animation: slideUpHandwritten 1s ease-out forwards;
        }
        
        @keyframes slideUpHandwritten {
            0% { opacity: 0; transform: translateY(40px) rotate(3deg) scale(0.9); }
            60% { transform: translateY(-5px) rotate(-1deg) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) rotate(1deg) scale(1); }
        }
        
        .close-timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(44, 62, 80, 0.3);
            border-top-color: #2C3E50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 50;
            opacity: 0.6;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .close-hint {
            position: fixed;
            bottom: 65px;
            right: 20px;
            font-family: 'Sniglet', cursive;
            font-size: 0.8rem;
            color: #2C3E50;
            opacity: 0.6;
            z-index: 50;
        }
        
        .closing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #4A90E2, #87CEEB);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }
        
        .closing-screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .closing-text {
            font-family: 'Sniglet', cursive;
            font-size: 3.0rem;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            animation: breathe 2s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #87CEEB;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-text {
            font-family: 'Sniglet', cursive;
            font-size: 3.5rem; /* scritta iniziale */
            color: white;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-text" id="loadingText">Vediamo...</div>
    </div>
    
    <!-- Cielo -->
    <div class="sky-container">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
        <div class="cloud cloud5"></div>
    </div>
    
    <!-- Bottone impostazioni -->
    <button class="settings-btn" onclick="openSettings()" aria-label="Settings">⚙️</button>
    
    <!-- Modal impostazioni -->
    <div class="settings-modal" id="settingsModal" onclick="closeSettingsOutside(event)">
        <div class="settings-content" onclick="event.stopPropagation()">
            <div class="settings-header">
                <div class="settings-title" id="settingsTitle">Impostazioni</div>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            
            <div class="language-option selected" onclick="selectLanguage('it')" id="lang-it">
                <div class="language-flag">🇮🇹</div>
                <div class="language-info">
                    <div class="language-name">Italiano</div>
                    <div class="language-native">Italian</div>
                </div>
                <div class="check-mark">✓</div>
            </div>
            
            <div class="language-option" onclick="selectLanguage('en')" id="lang-en">
                <div class="language-flag">🇬🇧</div>
                <div class="language-info">
                    <div class="language-name">English</div>
                    <div class="language-native">English</div>
                </div>
                <div class="check-mark">✓</div>
            </div>
        </div>
    </div>
    
    <!-- Container principale -->
    <div class="container">
        <img src="Santone.png" alt="Sage" class="sage-image" id="sageImage">
        
        <div class="text-container">
            <div id="dateDisplay" class="date-text"></div>

    <!-- Timer chiusura -->

        // Traduzioni UI
        const translations = {
            it: {

                settings: "Impostazioni",
                closeHint: "Si chiude tra 10s",

        // Gestione lingua
        let currentLang = localStorage.getItem('app_language') || 'it';

        function getTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        function getQuoteForToday() {
            const today = getTodayString();
            const key = `quote_${currentLang}_${today}`;
            const saved = localStorage.getItem(key);
            
            if (saved) return saved;
            
            const quotes = quotesDB[currentLang];
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            localStorage.setItem(key, quote);
            
            // Cleanup vecchie frasi
            cleanupOldQuotes();
            return quote;
        }

        function cleanupOldQuotes() {
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('quote_')) {
                    const datePart = key.split('_').pop();
                    if (datePart && datePart < weekAgoStr) {
                        localStorage.removeItem(key);
                    }
                }
            }
        }

        function formatDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            const locale = currentLang === 'it' ? 'it-IT' : 'en-US';
            return translations[currentLang].todayIs + new Date().toLocaleDateString(locale, options);
        }

        // UI Impostazioni
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
            updateLanguageUI();
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function closeSettingsOutside(event) {
            if (event.target === document.getElementById('settingsModal')) {
                closeSettings();
            }
        }

        function selectLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('app_language', lang);
            updateLanguageUI();
            location.reload(); // Ricarica per applicare lingua
        }

        function updateLanguageUI() {
            document.querySelectorAll('.language-option').forEach(el => {
                el.classList.remove('selected');
            });
            document.getElementById(`lang-${currentLang}`).classList.add('selected');
            document.getElementById('settingsTitle').textContent = translations[currentLang].settings;
        }

        // Animazioni
        function startAnimation() {
            const t = translations[currentLang];
            document.getElementById('loadingText').textContent = t.loading;
            document.getElementById('closeHint').textContent = t.closeHint;
            document.getElementById('closingText').innerHTML = t.closing;
            
            const dateDisplay = document.getElementById('dateDisplay');
            const quoteDisplay = document.getElementById('quoteDisplay');
            
            dateDisplay.textContent = formatDate();
            
            setTimeout(() => {
                dateDisplay.classList.add('fade-out');
                setTimeout(() => {
                    dateDisplay.style.display = 'none';
                    quoteDisplay.textContent = getQuoteForToday();
                    quoteDisplay.classList.add('visible');
                }, 800);
            }, 2500);
        }

        function scheduleClose() {
            setTimeout(() => {
                document.getElementById('closingScreen').classList.add('active');
            }, 5000);
        }

        // Init
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                startAnimation();
                scheduleClose();
            }, 800);
        });

        // Previene zoom
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('dblclick', e => e.preventDefault());
    </script>
</body>
</html>
