<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Sage">
    <title>Daily Sage</title>
    <link href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Sniglet', cursive;
            position: relative;
            background: #87CEEB;
        }
        
        /* Cielo con nuvole */
        .sky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #4A90E2 0%, #87CEEB 50%, #E0F6FF 100%);
            overflow: hidden;
            z-index: 1;
            transition: all 1s ease;
        }
        
        .sky-container.mystic {
            background: linear-gradient(to bottom, #4A90E2 0%, #87CEEB 50%, #E0F6FF 100%);
            /* background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%); */
        }
        
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 100px;
            opacity: 0.9;
            animation: floatUp linear infinite;
            transition: all 1s ease;
        }
        
        .sky-container.mystic .cloud {
            background: rgba(255, 255, 255, 0.8);
            /* background: rgba(147, 112, 219, 0.3); */
            opacity: 0.6;
        }
        
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 100px;
            transition: all 1s ease;
        }
        
        .sky-container.mystic .cloud::before,
        .sky-container.mystic .cloud::after {
            background: rgba(147, 112, 219, 0.3);
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0); }
            100% { transform: translateY(-200px) translateX(20px); }
        }
        
        .cloud1 { width: 100px; height: 40px; left: 10%; animation-duration: 25s; animation-delay: 0s; }
        .cloud1::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        .cloud1::after { width: 60px; height: 40px; top: -15px; right: 10px; }
        
        .cloud2 { width: 80px; height: 35px; left: 30%; animation-duration: 30s; animation-delay: 5s; }
        .cloud2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud2::after { width: 50px; height: 35px; top: -10px; right: 15px; }
        
        .cloud3 { width: 120px; height: 45px; left: 60%; animation-duration: 35s; animation-delay: 2s; }
        .cloud3::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud3::after { width: 70px; height: 45px; top: -20px; right: 20px; }
        
        .cloud4 { width: 90px; height: 38px; left: 80%; animation-duration: 28s; animation-delay: 8s; }
        .cloud4::before { width: 45px; height: 45px; top: -22px; left: 12px; }
        .cloud4::after { width: 55px; height: 38px; top: -12px; right: 12px; }
        
        .cloud5 { width: 110px; height: 42px; left: 45%; animation-duration: 32s; animation-delay: 12s; }
        .cloud5::before { width: 55px; height: 55px; top: -28px; left: 18px; }
        .cloud5::after { width: 65px; height: 42px; top: -18px; right: 18px; }
        
        /* Bottone impostazioni */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            font-size: 24px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }
        
        .settings-btn:hover {
            transform: rotate(90deg);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .settings-btn:active {
            transform: scale(0.95);
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Modal impostazioni */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .settings-modal.active {
            display: flex;
            opacity: 1;
        }
        
        .settings-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .settings-modal.active .settings-content {
            transform: scale(1);
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .settings-title {
            font-family: 'Sniglet', cursive;
            font-size: 1.5rem;
            color: #2C3E50;
            font-weight: 800;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #7F8C8D;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .close-btn:hover {
            background: #F0F0F0;
        }
        
        .language-option {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .language-option:hover {
            background: #F8F9FA;
        }
        
        .language-option.selected {
            background: #E3F2FD;
            border-color: #4A90E2;
        }
        
        .language-flag {
            font-size: 2rem;
            margin-right: 15px;
        }
        
        .language-info {
            flex: 1;
        }
        
        .language-name {
            font-family: 'Sniglet', cursive;
            font-size: 1.1rem;
            color: #2C3E50;
            font-weight: 700;
        }
        
        .language-native {
            font-size: 0.9rem;
            color: #7F8C8D;
        }
        
        .check-mark {
            font-size: 1.5rem;
            color: #4A90E2;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .language-option.selected .check-mark {
            opacity: 1;
        }
        
        /* Container principale */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .sage-image {
            width: 260px;
            height: 260px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
            animation: gentleFloat 4s ease-in-out infinite, fadeInScale 1.5s ease-out;
            margin-bottom: 30px;
            opacity: 0;
            animation-fill-mode: forwards;
            transition: all 0.5s ease;
        }
        
        .sage-image.mystic {
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6)) brightness(1.1);
            /* filter: drop-shadow(0 10px 30px rgba(147, 112, 219, 0.6)) brightness(1.1); */
            animation: gentleFloatMystic 3s ease-in-out infinite, pulseGlow 2s ease-in-out infinite;
        }
        
        @keyframes fadeInScale {
            0% { 
                opacity: 0; 
                transform: scale(0.5) rotate(-10deg); 
            }
            50% {
                transform: scale(1.05) rotate(2deg);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) rotate(0deg); 
            }
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes gentleFloatMystic {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }
        
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 10px 30px rgba(147, 112, 219, 0.6)) brightness(1.1); }
            50% { filter: drop-shadow(0 15px 40px rgba(147, 112, 219, 0.8)) brightness(1.3); }
        }
        
        .text-container {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            max-width: 90vw;
            flex-direction: column;
        }
        
        .date-text {
            font-family: 'Sniglet', cursive;
            font-size: 2.8rem;
            font-weight: 600;
            color: #2C3E50;
            text-shadow: 3px 3px 0px rgba(255,255,255,0.8), 5px 5px 10px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            opacity: 0;
            transform: scale(0.8) rotate(-2deg);
            animation: popIn 0.8s ease-out 0.8s forwards;
            line-height: 1.3;
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            70% { transform: scale(1.05) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(-2deg); }
        }
        
        .fade-out {
            animation: fadeOutRotate 0.8s ease-in forwards;
        }
        
        @keyframes fadeOutRotate {
            0% { opacity: 1; transform: scale(1) rotate(-2deg); }
            100% { opacity: 0; transform: scale(1.1) rotate(3deg) translateY(-30px); filter: blur(5px); }
        }
        
        .quote-text {
            font-family: 'Sniglet', cursive;
            font-size: 2.2rem;
            font-weight: 400;
            color: #1A252F;
            line-height: 1.5;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.9), 4px 4px 8px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(40px) rotate(3deg);
            max-width: 600px;
            padding: 0 20px;
        }
        
        .quote-text.visible {
            animation: slideUpHandwritten 1s ease-out forwards;
        }
        
        @keyframes slideUpHandwritten {
            0% { opacity: 0; transform: translateY(40px) rotate(3deg) scale(0.9); }
            60% { transform: translateY(-5px) rotate(-1deg) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) rotate(1deg) scale(1); }
        }
        
        /* Stili speciali per il sabato SuperEnalotto */
        .saturday-special {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF6347 100%) !important;
            padding: 30px !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5) !important;
            border: 4px solid #FFD700 !important;
        }
        
        .lottery-numbers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        
        .lottery-ball {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #ffeb3b, #ff9800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sniglet', cursive;
            font-size: 1.4rem;
            font-weight: 800;
            color: #d32f2f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 -2px 5px rgba(0,0,0,0.2);
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
            animation: bounceIn 0.6s ease-out forwards;
            opacity: 0;
        }
        
        .lottery-ball:nth-child(1) { animation-delay: 0.1s; }
        .lottery-ball:nth-child(2) { animation-delay: 0.2s; }
        .lottery-ball:nth-child(3) { animation-delay: 0.3s; }
        .lottery-ball:nth-child(4) { animation-delay: 0.4s; }
        .lottery-ball:nth-child(5) { animation-delay: 0.5s; }
        .lottery-ball:nth-child(6) { animation-delay: 0.6s; }
        
        .superstar-ball {
            background: radial-gradient(circle at 30% 30%, #e1f5fe, #0288d1) !important;
            color: #01579b !important;
            animation-delay: 0.8s !important;
            position: relative;
        }
        
        .superstar-ball::after {
            content: '★';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 1.2rem;
            color: #FFD700;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0) rotate(-180deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        
        .fortune-text {
            font-family: 'Sniglet', cursive;
            font-size: 1.8rem;
            color: #d32f2f;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* SEZIONE DOMANDA ORACOLO */
        .oracle-section {
            margin-top: 30px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
            width: 100%;
            max-width: 500px;
        }
        
        .oracle-section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .oracle-prompt {
            font-family: 'Sniglet', cursive;
            font-size: 1.4rem;
            color: #2C3E50;
            margin-bottom: 15px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .oracle-prompt:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            background: rgba(255,255,255,1);
        }
        
        .oracle-prompt::before {
            content: '🔮';
            font-size: 1.6rem;
            animation: crystalPulse 2s infinite;
        }
        
        @keyframes crystalPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.3); }
        }
        
        .oracle-input-container {
            display: none;
            flex-direction: column;
            gap: 15px;
            animation: expandIn 0.5s ease;
        }
        
        .oracle-input-container.active {
            display: flex;
        }
        
        @keyframes expandIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .oracle-input {
            font-family: 'Gochi Hand', cursive;
            font-size: 1.3rem;
            padding: 15px 20px;
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 15px;
            background: rgba(255,255,255,0.95);
            color: #2C3E50;
            outline: none;
            resize: none;
            min-height: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .oracle-input:focus {
            border-color: #9C27B0;
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.3);
            transform: scale(1.02);
        }
        
        .oracle-submit {
            font-family: 'Sniglet', cursive;
            font-size: 1.2rem;
            padding: 12px 30px;
            background: linear-gradient(135deg, #9C27B0, #E91E63);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4);
            transition: all 0.3s ease;
            align-self: center;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .oracle-submit:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(156, 39, 176, 0.6);
        }
        
        .oracle-submit:active {
            transform: scale(0.95);
        }
        
        .oracle-submit::after {
            content: '✨';
        }
        
        /* Risposta Oracolo */
        .oracle-response {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.95), rgba(233, 30, 99, 0.95));
            border-radius: 20px;
            color: white;
            font-family: 'Gochi Hand', cursive;
            font-size: 1.4rem;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 40px rgba(156, 39, 176, 0.4), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            animation: mysticalAppear 1s ease;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .oracle-response.active {
            display: block;
        }
        
        @keyframes mysticalAppear {
            0% { opacity: 0; transform: scale(0.8) rotate(-3deg); filter: blur(10px); }
            50% { transform: scale(1.02) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
        }
        
        .oracle-response::before {
            content: '🔮';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .oracle-response-text {
            position: relative;
            z-index: 1;
        }
        
        .oracle-mist {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: mistMove 3s ease-in-out;
        }
        
        @keyframes mistMove {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .thinking-dots {
            display: none;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }
        
        .thinking-dots.active {
            display: flex;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #9C27B0;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* Effetti particelle magiche */
        .magic-particle {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 2s ease-out forwards;
            z-index: 1000;
        }
        
        @keyframes particleFloat {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }
        
        .close-timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(44, 62, 80, 0.3);
            border-top-color: #2C3E50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 50;
            opacity: 0;
            animation: spin 1s linear infinite, fadeIn 1s ease-out 1s forwards;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .close-hint {
            position: fixed;
            bottom: 65px;
            right: 20px;
            font-family: 'Sniglet', cursive;
            font-size: 0.8rem;
            color: #2C3E50;
            opacity: 0;
            z-index: 50;
            animation: fadeIn 1s ease-out 1s forwards;
        }
        
        .closing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #4A90E2, #87CEEB);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }
        
        .closing-screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .closing-text {
            font-family: 'Sniglet', cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            animation: breathe 2s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- Cielo -->
    <div class="sky-container" id="skyContainer">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
        <div class="cloud cloud5"></div>
    </div>
    
    <!-- Bottone impostazioni -->
    <button class="settings-btn" onclick="openSettings()" aria-label="Settings">⚙️</button>
    
    <!-- Modal impostazioni -->
    <div class="settings-modal" id="settingsModal" onclick="closeSettingsOutside(event)">
        <div class="settings-content" onclick="event.stopPropagation()">
            <div class="settings-header">
                <div class="settings-title" id="settingsTitle">Impostazioni</div>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            
            <div class="language-option selected" onclick="selectLanguage('it')" id="lang-it">
                <div class="language-flag">🇮🇹</div>
                <div class="language-info">
                    <div class="language-name">Italiano</div>
                    <div class="language-native">Italian</div>
                </div>
                <div class="check-mark">✓</div>
            </div>

        // Genera numeri casuali da un array con peso
        function weightedRandom(numbers, count) {
            const result = [];
            const pool = [...numbers];
            
            for (let i = 0; i < count && pool.length > 0; i++) {
                const index = Math.floor(Math.random() * pool.length);
                result.push(pool.splice(index, 1)[0]);
            }
            return result.sort((a, b) => a - b);
        }

        function weightedChoice(items) {
           const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
           let random = Math.random() * totalWeight;

           for (const item of items) {
               random -= item.weight;
               if (random <= 0) return item.value;
           }

           return items[items.length - 1].value;
        }

        function shuffleArray(array) {
           const arr = [...array];
           for (let i = arr.length - 1; i > 0; i--) {
               const j = Math.floor(Math.random() * (i + 1));
               [arr[i], arr[j]] = [arr[j], arr[i]];
           }
          return arr;
        }

       function getPatternByProbability() {
       // pattern realistici per distribuire 6 numeri nelle decine
          return weightedChoice([
             { value: [2, 2, 1, 1], weight: 35 },
             { value: [2, 1, 1, 1, 1], weight: 25 },
             { value: [2, 2, 2], weight: 18 },
             { value: [3, 1, 1, 1], weight: 10 },
             { value: [3, 2, 1], weight: 7 },
             { value: [4, 1, 1], weight: 2 },
             { value: [1, 1, 1, 1, 1, 1], weight: 3 }
         ]);
        }

       function getWeightedDecadeKeys() {
          return [
            { key: 80, weight: 5 },
            { key: 40, weight: 5 },
            { key: 30, weight: 4 },
            { key: 60, weight: 4 },
            { key: 20, weight: 3 },
            { key: 10, weight: 3 },
            { key: 50, weight: 2 },
            { key: 0,  weight: 2 },
            { key: 70, weight: 1 }
        ];
       }

       function pickUniqueDecades(count) {
          const available = [...getWeightedDecadeKeys()];
          const selected = [];

          while (selected.length < count && available.length > 0) {
              const chosen = weightedChoice(
                  available.map(item => ({ value: item.key, weight: item.weight }))
              );

          selected.push(chosen);

          const index = available.findIndex(item => item.key === chosen);
             if (index !== -1) {
                 available.splice(index, 1);
             }
          }

          return selected;
       }

   
    function generateLuckyNumbers() {
          const stats = superEnalottoStats;
          const pattern = getPatternByProbability();   // es. [2,2,1,1]
          const decadeKeys = pickUniqueDecades(pattern.length);
          const numbers = [];

          for (let i = 0; i < pattern.length; i++) {
              const decadeKey = decadeKeys[i];
              const count = pattern[i];
              const pool = stats.hotNumbers[decadeKey] || [];

              numbers.push(...weightedRandom(pool, count));
          }

       // rimuove eventuali duplicati
       let uniqueNumbers = [...new Set(numbers)];

       // se per qualche motivo mancano numeri, completa da tutte le serie hot
       const refillPool = Object.values(stats.hotNumbers).flat();

       while (uniqueNumbers.length < 6) {
          const extra = weightedRandom(refillPool, 1)[0];
          if (!uniqueNumbers.includes(extra)) {
             uniqueNumbers.push(extra);
          }
       }

       // sicurezza finale
       uniqueNumbers = uniqueNumbers.slice(0, 6);

       return uniqueNumbers.sort((a, b) => a - b);
    }

        function cleanupOldQuotes() {
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];

            const keysToRemove = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.startsWith('quote_') || key.startsWith('fortune_'))) {
                    const datePart = key.split('_').pop();
                    if (datePart && datePart < weekAgoStr) {
                        keysToRemove.push(key);
                    }
                }
            }
            keysToRemove.forEach(key => localStorage.removeItem(key));
        }

        function analyzeQuestion(question) {
            const lowerQ = question.toLowerCase();
            const keywords = questionKeywords[currentLang];
            
            // Controlla categorie in ordine di priorità
            if (keywords.yesNo.some(k => lowerQ.includes(k))) return 'yesNo';
            if (keywords.love.some(k => lowerQ.includes(k))) return 'love';
            if (keywords.money.some(k => lowerQ.includes(k))) return 'money';
            if (keywords.work.some(k => lowerQ.includes(k))) return 'work';
            if (keywords.health.some(k => lowerQ.includes(k))) return 'health';
            if (keywords.future.some(k => lowerQ.includes(k))) return 'future';
            
            return 'generic';
        }

        function generateOracleResponse(question) {
            const category = analyzeQuestion(question);
            const responses = oracleDB[currentLang][category];
            
            // Seleziona risposta basata su hash della domanda per consistenza
            let hash = 0;
            for (let i = 0; i < question.length; i++) {
                hash = ((hash << 5) - hash) + question.charCodeAt(i);
                hash = hash & hash;
            }
            
            const index = Math.abs(hash) % responses.length;
            return responses[index];
        }

        function createMagicParticles(x, y) {
            const colors = ['#FFD700', '#FF69B4', '#00CED1', '#9370DB', '#FF6347'];

                const particle = document.createElement('div');

                particle.innerHTML = ['✨', '⭐', '🔮', '💫', '✦'][Math.floor(Math.random() * 5)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.fontSize = (15 + Math.random() * 20) + 'px';
                particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (Math.PI * 2 * i) / 12;
                const distance = 50 + Math.random() * 100;
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                particle.style.animationDelay = (i * 0.05) + 's';
                
                container.appendChild(particle);
                
                setTimeout(() => particle.remove(), 2000);
            }
        }
